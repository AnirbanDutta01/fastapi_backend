#version: "3.8"

services:
  db:
    image: postgres:13
    container_name: postgres_db
    environment:
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "root"
      POSTGRES_DB: "fastapi_backendOne"
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  fastapi_app:
    build: .
    container_name: fastapi_app
    depends_on: 
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      - psql_user=postgres
      - psql_password=root
      - psql_host=db
      - psql_port=5432
      - psql_database=fastapi_backendOne
    
volumes:
  postgres_data:
